<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#E0E7FF"/>
  <!-- Suit body (navy) -->
  <ellipse cx="50" cy="112" rx="52" ry="34" fill="#1E1B4B"/>
  <!-- White shirt collar V -->
  <path d="M 44 78 L 50 91 L 56 78" fill="white" stroke="none"/>
  <!-- Tie (indigo) -->
  <line x1="50" y1="78" x2="50" y2="91" stroke="#4338CA" stroke-width="3" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="44" y="65" width="12" height="15" rx="4" fill="#C8956A"/>
  <!-- Head / face -->
  <ellipse cx="50" cy="50" rx="22" ry="24" fill="#C8956A"/>
  <!-- Silver hair crown -->
  <ellipse cx="50" cy="28" rx="22" ry="11" fill="#A0A8B0"/>
  <!-- Calm composed eyebrows -->
  <path d="M 39 43 Q 43 41.5 47 43" stroke="#6B5A42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 53 43 Q 57 41.5 61 43" stroke="#6B5A42" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="43" cy="48" r="2.8" fill="#2C1810"/>
  <circle cx="57" cy="48" r="2.8" fill="#2C1810"/>
  <!-- Eye highlight -->
  <circle cx="44.2" cy="47" r="0.9" fill="white"/>
  <circle cx="58.2" cy="47" r="0.9" fill="white"/>
  <!-- Composed authoritative smile -->
  <path d="M 44 57 Q 50 62 56 57" stroke="#8B5E3C" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
