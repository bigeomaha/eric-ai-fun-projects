<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#FCE7F3"/>
  <!-- Long blonde hair SIDES drawn first (behind face) -->
  <ellipse cx="25" cy="70" rx="11" ry="32" fill="#D4A520"/>
  <ellipse cx="75" cy="70" rx="11" ry="32" fill="#D4A520"/>
  <!-- Bright pink outfit -->
  <ellipse cx="50" cy="112" rx="52" ry="34" fill="#9D174D"/>
  <!-- White top collar -->
  <path d="M 44 78 L 50 90 L 56 78" fill="#EC4899" stroke="none"/>
  <!-- Neck -->
  <rect x="44" y="65" width="12" height="15" rx="4" fill="#C8956A"/>
  <!-- Head / face -->
  <ellipse cx="50" cy="50" rx="22" ry="24" fill="#C8956A"/>
  <!-- Blonde crown hair -->
  <ellipse cx="50" cy="27" rx="22" ry="12" fill="#D4A520"/>
  <!-- Bright raised happy brows -->
  <path d="M 39 41 Q 43 38.5 47 40.5" stroke="#8B6020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 53 40.5 Q 57 38.5 61 41" stroke="#8B6020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Wide bright eyes -->
  <circle cx="43" cy="47.5" r="3.5" fill="#2C1810"/>
  <circle cx="57" cy="47.5" r="3.5" fill="#2C1810"/>
  <!-- Eye shine (beaming!) -->
  <circle cx="44.5" cy="46" r="1.2" fill="white"/>
  <circle cx="58.5" cy="46" r="1.2" fill="white"/>
  <!-- HUGE full smile -->
  <path d="M 38 55.5 Q 50 71 62 55.5" stroke="#8B5E3C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks (manifesting!) -->
  <circle cx="35" cy="54" r="6" fill="#F9A8D4" opacity="0.45"/>
  <circle cx="65" cy="54" r="6" fill="#F9A8D4" opacity="0.45"/>
</svg>
