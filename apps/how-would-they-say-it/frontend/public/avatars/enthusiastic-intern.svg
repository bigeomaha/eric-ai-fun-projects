<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#DCFCE7"/>
  <!-- Casual shirt (green) -->
  <ellipse cx="50" cy="112" rx="52" ry="34" fill="#065F46"/>
  <!-- Open polo collar -->
  <path d="M 44 78 L 50 87 L 56 78" fill="#047857" stroke="none"/>
  <!-- Neck -->
  <rect x="44" y="65" width="12" height="15" rx="4" fill="#C8956A"/>
  <!-- Head / face -->
  <ellipse cx="50" cy="50" rx="22" ry="24" fill="#C8956A"/>
  <!-- Sandy/light brown hair (youthful, messy) -->
  <ellipse cx="50" cy="27" rx="23" ry="12" fill="#C4922A"/>
  <!-- Slightly tousled hair detail -->
  <ellipse cx="38" cy="32" rx="7" ry="5" fill="#C4922A"/>
  <ellipse cx="62" cy="32" rx="7" ry="5" fill="#C4922A"/>
  <!-- Raised enthusiastic eyebrows -->
  <path d="M 39 41.5 Q 43 39 47 41" stroke="#8B6020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 53 41 Q 57 39 61 41.5" stroke="#8B6020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Wide eager eyes -->
  <circle cx="43" cy="47.5" r="3.5" fill="#2C1810"/>
  <circle cx="57" cy="47.5" r="3.5" fill="#2C1810"/>
  <!-- Eye shine (eager!) -->
  <circle cx="44.5" cy="46" r="1.1" fill="white"/>
  <circle cx="58.5" cy="46" r="1.1" fill="white"/>
  <!-- HUGE enthusiastic smile -->
  <path d="M 39 56 Q 50 70 61 56" stroke="#8B5E3C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks (excited) -->
  <circle cx="36" cy="54" r="5" fill="#F97316" opacity="0.2"/>
  <circle cx="64" cy="54" r="5" fill="#F97316" opacity="0.2"/>
</svg>
